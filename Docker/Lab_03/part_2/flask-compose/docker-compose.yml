services:

  flask:
    image: localhost:5000/iti-flask-lab2
    container_name: flask_app
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: nginx_front
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask